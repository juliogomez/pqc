connections {
    pqc-tunnel {
        local_addrs  = 172.20.0.3

        # Key exchange proposal — toggle between hybrid and classical for Exercise 2:
        proposals = aes256gcm16-prfsha256-x25519-ke1_mlkem768
        # proposals = aes256gcm16-prfsha256-x25519

        # Required for hybrid: ML-KEM-768 public key (1184 B) exceeds the IKE message
        # size limit and must be fragmented. Comment out when using classical-only above.
        fragmentation = yes

        # RFC 8784 post-quantum preshared key (Exercise 3). Mixes a static high-entropy
        # secret into the IKE key schedule, so the session keys resist a quantum attacker
        # even if the (EC)DH is broken. Uncomment on BOTH peers for Exercise 3; leave
        # commented for Exercises 1-2.
        # ppk_id = pqc-lab-ppk
        # ppk_required = yes

        local {
            auth = psk
        }
        remote {
            auth = psk
        }

        children {
            pqc-child {
                local_ts  = 172.20.0.3/32
                remote_ts = 172.20.0.2/32
            }
        }
    }
}

secrets {
    ike-psk {
        # LAB ONLY: this pre-shared key is a throwaway, committed in clear text for
        # convenience. Never reuse it or this pattern in production — real deployments
        # must use a high-entropy secret sourced from a secrets manager / env, not VCS.
        secret = "pqc-lab-preshared-key"
    }

    # LAB ONLY throwaway PPK for Exercise 3 (RFC 8784). Same rules as the PSK above:
    # never reuse; a real PPK needs >=256 bits of entropy from a secrets manager.
    # Uncomment on BOTH peers (with ppk_id above) for Exercise 3.
    # ppk-lab {
    #     id = pqc-lab-ppk
    #     secret = 0x5c9a3f1e8b7d4602af19e3c8d05b6f27a4e91d83c2b7f0a6e5d4c3b2a1908f7e
    # }
}
