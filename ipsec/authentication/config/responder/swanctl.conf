connections {
    auth-tunnel {
        local_addrs  = 172.21.0.3
        remote_addrs = 172.21.0.2

        # Hybrid classical (X25519) + post-quantum (ML-KEM-768) key exchange.
        # The KE stays post-quantum in both stages; only the *authentication*
        # algorithm changes (ECDSA in Stage 1, ML-DSA in Stage 2).
        proposals = aes256gcm16-prfsha256-x25519-ke1_mlkem768

        # Required: ML-KEM (and, in Stage 2, large ML-DSA certs/signatures)
        # push IKE messages past the size limit, so they must be fragmented.
        fragmentation = yes

        # Certificate-based mutual authentication. The leaf cert + private key
        # and the CA cert are produced by gen-certs.sh and auto-loaded from the
        # x509/, private/ and x509ca/ credential directories.
        local {
            auth  = pubkey
            certs = responder.crt
            id    = responder.pqc.lab
        }
        remote {
            auth = pubkey
            id   = initiator.pqc.lab
        }

        children {
            auth-child {
                local_ts  = 172.21.0.3/32
                remote_ts = 172.21.0.2/32
            }
        }
    }
}
