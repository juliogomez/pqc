# hostapd: the 802.1X authenticator (the "switch port") with an integrated
# EAP-TLS server. Runs on the authenticator end of the veth link ("aut").
#
# Start it (inside the macsec-authenticator container) with:
#   hostapd -dd /cfg/hostapd.conf
interface=aut
driver=wired

# Enable 802.1X authentication and the built-in EAP server (no external RADIUS).
ieee8021x=1
eap_server=1
eap_user_file=/cfg/eap_user

# EAP-TLS server credentials (minted by gen-certs.sh, mounted at /cfg).
# These are ECDSA with the classical certs and ML-DSA once you reissue with
# certgen ml-dsa-*; hostapd doesn't care which, it just presents whatever
# cert/key it is given.
ca_cert=/cfg/ca.crt
server_cert=/cfg/server.crt
private_key=/cfg/server.key

# Require TLS 1.3 for the EAP-TLS server. hostapd DISABLES TLS 1.3 for EAP by
# default (TLS_CONN_DISABLE_TLSv1_3 in ap_config.c), which would silently
# downgrade the handshake to TLS 1.2 and lose the hybrid ML-KEM key exchange.
# [ENABLE-TLSv1.3] clears that default; disabling 1.0-1.2 pins the handshake to
# TLS 1.3 so the post-quantum group (X25519MLKEM768) is actually used. ML-DSA
# certificate auth needs TLS 1.3 too.
tls_flags=[ENABLE-TLSv1.3][DISABLE-TLSv1.0][DISABLE-TLSv1.1][DISABLE-TLSv1.2]
