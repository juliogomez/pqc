# wpa_supplicant: the 802.1X supplicant (the "endpoint"). Runs on the supplicant
# end of the veth link ("sup").
#
# Start it (inside the macsec-supplicant container) with:
#   wpa_supplicant -dd -Dwired -isup -c /cfg/wpa_supplicant.conf
ctrl_interface=/run/wpa
eapol_version=2
ap_scan=0
fast_reauth=0

network={
    key_mgmt=IEEE8021X
    eap=TLS
    identity="client.pqc.lab"

    # EAP-TLS credentials (minted by gen-certs.sh, mounted at /cfg). ECDSA with
    # the classical certs, ML-DSA once you reissue with certgen ml-dsa-*;
    # wpa_supplicant uses whichever it loads.
    ca_cert="/cfg/ca.crt"
    client_cert="/cfg/client.crt"
    private_key="/cfg/client.key"

    # Require TLS 1.3 for the EAP-TLS handshake. This is the whole point of the
    # lab: hybrid ML-KEM (X25519MLKEM768) is a TLS 1.3 key exchange, so pinning
    # 1.3 guarantees the post-quantum group is used (OpenSSL 3.5 prefers it by
    # default), and ML-DSA certificate auth is a TLS 1.3 feature too. Drop these
    # and the handshake may fall back to TLS 1.2, which has no ML-KEM. Requires
    # wpa_supplicant built with CONFIG_EAP_TLSV1_3=y.
    # phase1="tls_disable_tlsv1_0=1 tls_disable_tlsv1_1=1 tls_disable_tlsv1_2=1"

    eapol_flags=0
}

# --- Optional appendix: pre-shared CAK MACsec data plane (Linux/Colima only) ---
# The exercises above run the post-quantum EAP-TLS *handshake* on any Docker
# host. Actually encrypting frames with the kernel MACsec driver needs a kernel
# built with CONFIG_MACSEC (Docker Desktop's LinuxKit kernel is not). On a
# macsec-capable kernel you can drive the data plane directly with a static CAK
# (no EAP), using a config like this on each peer (driver=macsec_linux):
#
# network={
#     key_mgmt=NONE
#     mka_cak=0123456789abcdef0123456789abcdef
#     mka_ckn=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
#     mka_priority=128
#     macsec_policy=1
# }
#
# See the README's "A note on the data plane" section for the full walkthrough.
